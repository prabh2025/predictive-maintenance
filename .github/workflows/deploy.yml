name: CI/CD Predictive Maintenance

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t predictive-maintenance .
      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin
      - name: Push image
        run: |
          docker tag predictive-maintenance \
          ${{ secrets.DOCKER_USERNAME }}/predictive-maintenance:latest
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/predictive-maintenance:latest